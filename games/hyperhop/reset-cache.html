<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reset HyperHop Cache</title>
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#020408;color:#fff;font:800 16px system-ui;padding:24px}
    .card{width:min(560px,92vw);border:1px solid rgba(255,255,255,.16);border-radius:22px;background:rgba(7,12,22,.88);padding:28px;text-align:center;box-shadow:0 18px 60px rgba(0,0,0,.45)}
    button,a{display:inline-flex;margin:8px;padding:12px 16px;border-radius:14px;border:1px solid rgba(40,215,255,.42);background:#0b1220;color:#fff;text-decoration:none;font:900 15px system-ui}
    button{cursor:pointer} p{color:#b7c0cc}
  </style>
</head>
<body>
  <main class="card">
    <h1>Reset HyperHop Cache</h1>
    <p>Clears this game's service worker and KGB caches so hotfixes load immediately during development.</p>
    <button id="reset">Reset cache</button>
    <a href="./">Back to game</a>
    <p id="status"></p>
  </main>
  <script>
    document.getElementById('reset').addEventListener('click', async () => {
      const status = document.getElementById('status');
      status.textContent = 'Resetting...';
      if ('serviceWorker' in navigator) {
        const regs = await navigator.serviceWorker.getRegistrations();
        await Promise.all(regs.map((reg) => reg.unregister()));
      }
      if ('caches' in window) {
        const keys = await caches.keys();
        await Promise.all(keys.filter((key) => key.startsWith('kgb-')).map((key) => caches.delete(key)));
      }
      status.textContent = 'Done. Reload the game.';
    });
  </script>
</body>
</html>
