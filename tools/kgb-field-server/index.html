<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#07100d">
  <title>KGB Field Server</title>
  <link rel="manifest" href="manifest.webmanifest">
  <style>
    *{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#07100d;color:#d9ffe7;font-family:ui-monospace,SFMono-Regular,Consolas,monospace}body{padding:env(safe-area-inset-top) 12px env(safe-area-inset-bottom)}
    .shell{width:min(1100px,100%);margin:auto}.top{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 4px}.brand{font-weight:900;letter-spacing:.08em;color:#70ff9b}.tag{font-size:11px;color:#79a98a}
    .panel{border:1px solid #245d39;background:#0a1711;padding:12px;box-shadow:0 0 22px #00ff5520}.controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
    button,.button,select{min-height:42px;border:1px solid #36784c;background:#11281a;color:#d9ffe7;padding:10px 13px;font:inherit;border-radius:3px}.button{display:inline-flex;align-items:center;cursor:pointer}button.primary{background:#56e883;color:#041008;font-weight:900}button:disabled{opacity:.4}input[type=file]{display:none}select{flex:1;min-width:180px}
    #status{padding:10px 2px 0;color:#8fc9a1;font-size:12px;min-height:27px}#status.bad{color:#ff7b7b}.tools{margin-top:8px;display:flex;gap:7px;flex-wrap:wrap}.tools button{font-size:12px;min-height:35px;padding:7px 10px}
    #stage{height:calc(100vh - 210px);min-height:360px;margin-top:10px;border:1px solid #245d39;background:#020504;position:relative;overflow:hidden}#gameFrame{border:0;width:100%;height:100%;background:#000}#empty{position:absolute;inset:0;display:grid;place-items:center;color:#446b50;text-align:center;padding:30px}.playing #empty{display:none}
    @media(max-width:620px){body{padding-left:7px;padding-right:7px}.top{padding:10px 2px}.tag{display:none}.panel{padding:8px}.controls>*{flex:1 1 46%}.controls select{flex-basis:100%}#stage{height:calc(100vh - 225px);margin-top:7px}}
  </style>
</head>
<body>
  <main class="shell">
    <header class="top"><div class="brand">KGB FIELD SERVER</div><div class="tag">LOCAL GAME TEST HARNESS // v1.0.2</div></header>
    <section class="panel">
      <div class="controls">
        <label class="button" for="zipInput">LOAD ZIP</label><input id="zipInput" type="file" accept=".zip,application/zip">
        <label class="button" for="folderInput">LOAD FOLDER</label><input id="folderInput" type="file" webkitdirectory multiple>
        <select id="launchSelect" aria-label="Launch file"></select>
        <button id="launchBtn" class="primary" disabled>LAUNCH</button>
      </div>
      <div id="status">No game loaded.</div>
      <div class="tools">
        <button id="reloadBtn">RELOAD GAME</button><button id="fullBtn">FULLSCREEN</button><button id="tabBtn">OPEN TAB</button><button id="clearBtn">CLEAR GAME</button>
      </div>
    </section>
    <section id="stage"><div id="empty">LOAD A GAME ZIP<br>THEN SELECT ITS HTML ENTRY POINT</div><iframe id="gameFrame" title="Game preview" hidden allow="autoplay; fullscreen; gamepad"></iframe></section>
  </main>
  <script src="app.js"></script>
</body>
</html>
