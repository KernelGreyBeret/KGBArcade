<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KGB Forge</title>
  <link rel="stylesheet" href="css/forge.css" />
</head>
<body>
  <div id="app" class="forge-app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">K</div>
        <div>
          <div class="brand-title">KGB Forge</div>
          <div class="brand-subtitle">Production Tool Suite</div>
        </div>
      </div>
      <div class="version-pill">v0.1</div>
    </header>

    <nav class="menubar">
      <button data-menu="file">File</button>
      <button data-menu="view">View</button>
      <button data-menu="modules">Modules</button>
      <button data-menu="help">Help</button>
    </nav>

    <main class="shell">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-head">
          <span>Modules</span>
          <button id="collapseSidebar" title="Collapse sidebar">⇤</button>
        </div>
        <div id="moduleList" class="module-list"></div>
      </aside>

      <section class="workspace-wrap">
        <div class="toolbar" id="toolbar">
          <button id="btnOpenModule">Open</button>
          <button id="btnSaveSettings">Save Settings</button>
          <button id="btnClearStatus">Clear</button>
          <button id="btnAbout">About</button>
        </div>
        <section id="workspace" class="workspace"></section>
      </section>
    </main>

    <footer class="statusbar">
      <span id="statusText">Ready</span>
      <span id="statusDetail">Idle</span>
    </footer>
  </div>

  <div id="toastHost" class="toast-host"></div>
  <dialog id="modal" class="modal">
    <form method="dialog">
      <div id="modalTitle" class="modal-title">Dialog</div>
      <div id="modalBody" class="modal-body"></div>
      <menu>
        <button value="cancel">Close</button>
      </menu>
    </form>
  </dialog>

  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/shell.js"></script>
  <script src="js/modules/repoforge.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
